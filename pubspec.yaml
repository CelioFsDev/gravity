name: catalogo_ja
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.6.1
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Routing
  go_router: ^17.0.1
  # UI Assets
  fl_chart: ^1.1.1
  intl: ^0.20.2
  uuid: ^4.5.2
  google_fonts: ^8.0.0
  url_launcher: ^6.3.2
  # Utils
  csv: ^7.1.0
  archive: ^4.0.7
  file_picker: ^10.3.9
  path: ^1.9.1
  path_provider: ^2.1.5
  # PDF and Export
  pdf: ^3.11.3
  printing: ^5.14.2
  share_plus: ^12.0.1
  # Backend - Using newer compatible versions
  firebase_core: ^3.11.0
  firebase_auth: ^5.4.4
  cloud_firestore: ^5.6.2
  cloud_functions: ^5.5.0
  google_sign_in: ^7.2.0
  firebase_crashlytics: ^4.3.0
  # Media
  http: ^1.2.2
  flutter_image_compress: ^2.4.0
  google_generative_ai: ^0.4.7
  diacritic: ^0.1.5
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  image_picker: ^1.1.2
  firebase_storage: ^12.4.10
  connectivity_plus: ^7.1.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: 2.4.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  windows: true
  image_path: assets/branding/icons/catalogo_ja_icon_premium.png
  adaptive_icon_background: '#060C1C'
  adaptive_icon_foreground: assets/branding/icons/catalogo_ja_icon_premium.png

flutter_native_splash:
  color: "#060C1C"
  image: assets/branding/logo/catalogoja_logo_master_2048x2048.png
  android_12:
    image: assets/branding/logo/catalogoja_logo_master_2048x2048.png
    color: "#060C1C"
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/images/google_logo.png
    - assets/branding/logo/
    - assets/branding/splash/
    - assets/branding/login/
    - assets/branding/icons/
    - assets/branding/placeholders/
    - assets/branding/empty_states/
    - assets/branding/banners/
    - assets/branding/catalogs/
